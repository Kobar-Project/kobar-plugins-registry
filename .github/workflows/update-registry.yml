name: Update Plugin Registry

on:
  # plugins.json dosyasına biri yeni repo eklediğinde çalışır
  push:
    branches: [ "main" ]
    paths:
      - 'plugins.json'
  # Veya her gece saat 00:00'da otomatik çalışıp yeni versiyonları kontrol eder
  schedule:
    - cron: '0 0 * * *'
  # Actions sekmesinden manuel tetiklemeye izin verir
  workflow_dispatch: 

jobs:
  build-registry:
    runs-on: ubuntu-latest
    
    # Repoya yazma izni (Commit atabilmesi için zorunlu)
    permissions:
      contents: write

    steps:
      - name: Repoyu Klonla (Checkout)
        uses: actions/checkout@v4
      
      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Registry'i Oluştur (Bot Çalışıyor)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-registry.js
        
      - name: Değişiklikleri Commit Et ve Gönder
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add registry.json
          
          # Eğer registry.json dosyasında bir değişiklik varsa commit'le
          git diff --quiet && git diff --staged --quiet || (git commit -m "bot: registry.json otomatik güncellendi" && git push)
