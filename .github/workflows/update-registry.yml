name: Update Plugin Registry

on:
  # Triggers when someone adds a new repo to plugins.json
  push:
    branches: [ "main" ]
    paths:
      - 'plugins.json'
  # Or runs automatically every night at 00:00 to check for new versions
  schedule:
    - cron: '0 0 * * *'
  # Allows manual trigger from the Actions tab
  workflow_dispatch: 

jobs:
  build-registry:
    runs-on: ubuntu-latest
    
    # Write permission required to commit changes
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Build Registry (Bot Running)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-registry.js
        
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add registry.json
          
          # Commit if there are changes in registry.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "bot: automated registry.json update" && git push)
